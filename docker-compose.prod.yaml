services:
  concrescent:
    build:
      dockerfile: ./build/concrescent/Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "80:8080"
    user: nobody
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config/msmtprc:/etc/msmtprc:ro
      - ./config/concrescent.php:/srv/app/config/concrescent.php:ro
    env_file:
    - .env.prod
    - .env
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    volumes:
      - ./var/mysql-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d/
    env_file:
    - .env.prod
    - .env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 2s
      timeout: 10s
      retries: 5
