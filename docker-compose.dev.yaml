services:
  concrescent:
    build:
      dockerfile: ./build/concrescent/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "80:8080"
    user: nobody
    depends_on:
      - mysql
    volumes:
      - ./cm2:/srv/app/cm2:ro
      - ./src:/srv/app/src:ro
      - ./tests:/srv/app/tests:ro
      - ./bin:/srv/app/bin:ro
      - ./vendor:/srv/app/vendor:ro
      - ./templates:/srv/app/templates:ro
      - ./config/msmtprc:/etc/msmtprc:ro
      - ./config/concrescent.php:/srv/app/config/concrescent.php:ro
      - ./var/db:/srv/app/var/db
      - ./var/cache:/srv/app/var/cache
      - ./var/log/concrescent:/srv/app/var/log/concrescent
      - ./.env:/srv/app/.env
      - ./.env.dev:/srv/app/.env.dev
      - ./.env.dev.local:/srv/app/.env.dev.local
    env_file:
      - path: .env.dev.local
        required: false
      - path: .env.dev
        required: true
      - path: .env
        required: true
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
    - "3306:3306"
    command:
      - '--general-log=ON'
      - '--general-log-file=/var/log/mysql/query.log'
      - '--log-output=FILE'
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./var/mysql-data:/var/lib/mysql:delegated
      - ./var/log/mysql:/var/log/mysql:delegated
    env_file:
      - path: .env.dev.local
        required: false
      - path: .env.dev
        required: true
      - path: .env
        required: true
  mail:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
    - "8025:8025"
    environment:
      TZ: ${TZ}
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_TLS_CERT: /srv/cert/mailpit.crt
      MP_SMTP_TLS_KEY: /srv/cert/mailpit.key
    volumes:
    - ./var/mailpit:/data:delegated
    - ./build/config/mailpit-certs:/srv/cert:ro
  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=rootpasswd
